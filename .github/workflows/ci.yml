name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Run cargo check
        run: cargo check --workspace --all-targets --all-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  shell-scripts:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell script line endings and syntax
        shell: bash
        run: |
          set -euo pipefail

          failed=0
          while IFS= read -r script; do
            if grep -Il $'\r' "$script" >/dev/null; then
              echo "::error file=${script}::Shell scripts must use LF line endings"
              failed=1
            fi

            first_line="$(head -n 1 "$script")"
            case "$first_line" in
              *bash*) bash -n "$script" ;;
            esac
          done < <(git ls-files '*.sh')

          exit "$failed"

      - name: Smoke test startup benchmark CLI
        shell: bash
        run: |
          set -euo pipefail

          fake_bin="$(mktemp -d)"
          trap 'rm -rf "$fake_bin"' EXIT

          cat > "$fake_bin/sage" <<'EOF'
          #!/usr/bin/env bash
          echo "sage 0.0.0"
          EOF
          chmod +x "$fake_bin/sage"

          PATH="$fake_bin:$PATH" bash benchmarks/startup.sh --help
          PATH="$fake_bin:$PATH" bash benchmarks/startup.sh --iterations 1 --json \
            | python3 -m json.tool >/dev/null

          cat > "$fake_bin/date" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            +%s%N) echo "1000N" ;;
            +%s) echo "1000" ;;
            *) /usr/bin/date "$@" ;;
          esac
          EOF
          chmod +x "$fake_bin/date"

          PATH="$fake_bin:$PATH" bash benchmarks/startup.sh --iterations 1 >/dev/null

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace --all-targets --verbose

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: [fmt, shell-scripts, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup cross-compilation
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p sage-cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sage
          if-no-files-found: error
