name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  deny:
    name: License & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check dependencies
        run: cargo deny check

  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check for outdated dependencies
        run: cargo outdated --workspace --root-deps-only --exit-code 1

  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Check MSRV compatibility
        run: cargo check --locked --all-features

  workflow-policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release and supply-chain workflow policy
        run: python3 scripts/release_gate.py validate-workflows --repo .

  required-security-gates:
    name: Required security gates
    runs-on: ubuntu-latest
    if: always()
    needs: [audit, deny, outdated, msrv, workflow-policy]
    steps:
      - name: Require every security gate
        shell: bash
        run: |
          set -euo pipefail

          for result in \
            "${{ needs.audit.result }}" \
            "${{ needs.deny.result }}" \
            "${{ needs.outdated.result }}" \
            "${{ needs.msrv.result }}" \
            "${{ needs.workflow-policy.result }}"; do
            if [ "$result" != "success" ]; then
              echo "A required security gate finished with result: $result"
              exit 1
            fi
          done

          echo "All required security gates passed."
