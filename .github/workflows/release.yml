# GitHub Actions workflow for building and releasing Sage
# Triggers on version tags (v*)
# Builds binaries for multiple platforms and creates a GitHub release

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Create release draft
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Sage ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Sage ${{ github.ref_name }}

            **Blazing fast code agent in pure Rust** - 10x faster startup than Node.js alternatives.

            ### Quick Install

            **macOS/Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/majiayu000/sage/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/majiayu000/sage/main/install.ps1 | iex
            ```

            **Homebrew:**
            ```bash
            brew install majiayu000/sage/sage
            ```

            **Cargo:**
            ```bash
            cargo install sage-cli
            ```

            ### Download Binaries

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon | `sage-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | macOS | Intel x64 | `sage-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | Linux | x64 (glibc) | `sage-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | x64 (musl) | `sage-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux | ARM64 | `sage-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz` |
            | Windows | x64 | `sage-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |

            ### Checksums

            ```
            SHA256 checksums will be added after build completes
            ```

            ### What's New

            See [CHANGELOG.md](https://github.com/majiayu000/sage/blob/main/CHANGELOG.md) for details.

  # Build binaries for each platform
  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin
            archive: tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-apple-darwin
            archive: tar.gz

          # Linux glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu
            archive: tar.gz

          # Linux musl (static binary)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-musl
            archive: tar.gz

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sage.exe
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup cross-compilation
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --package sage-cli

      - name: Strip binary (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (Linux cross)
        if: matrix.cross
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ../../../${{ matrix.asset_name }}.zip

      - name: Calculate SHA256
        id: sha
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            echo "sha256=$(sha256sum ${{ matrix.asset_name }}.tar.gz | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          else
            echo "sha256=$(sha256sum ${{ matrix.asset_name }}.zip | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release Asset (tar.gz)
        if: matrix.archive == 'tar.gz'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz
          asset_name: ${{ matrix.asset_name }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Release Asset (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.zip
          asset_name: ${{ matrix.asset_name }}.zip
          asset_content_type: application/zip

  # Publish release (remove draft status)
  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts info and create checksums
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "# SHA256 Checksums for Sage ${VERSION}" > checksums.txt
          echo "" >> checksums.txt
          # Note: In a real scenario, you'd download and checksum each file
          # For now, the checksums are embedded in the build job

      - name: Publish release
        uses: eregon/publish-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}

  # Publish only the owned Sage sub-crates. The root package is not published
  # because the "sage" crate name is owned by another crates.io package.
  publish-crates:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}  # Skip for pre-releases
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io token
        id: crates_io_token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=crates.io publish skipped::CRATES_IO_TOKEN is not configured for this repository."
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Publish owned Sage crates
        if: steps.crates_io_token.outputs.available == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          already_published=10

          crate_version() {
            local crate="$1"
            cargo metadata --no-deps --format-version 1 \
              | python3 -c '
          import json
          import sys

          crate = sys.argv[1]
          metadata = json.load(sys.stdin)
          for package in metadata["packages"]:
              if package["name"] == crate:
                  print(package["version"])
                  raise SystemExit(0)

          raise SystemExit(f"package {crate!r} was not found in cargo metadata")
          ' "$crate"
          }

          crate_exists() {
            local crate="$1"
            local version="$2"
            curl -fsSL \
              -H "User-Agent: majiayu000/sage-release-workflow" \
              "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1
          }

          wait_for_crate() {
            local crate="$1"
            local version="$2"

            for attempt in {1..30}; do
              if crate_exists "$crate" "$version"; then
                echo "${crate} ${version} is visible on crates.io"
                return 0
              fi

              echo "Waiting for ${crate} ${version} to appear on crates.io (${attempt}/30)"
              sleep 10
            done

            echo "::error title=crates.io publish timeout::${crate} ${version} was not visible after publish."
            return 1
          }

          publish_crate() {
            local crate="$1"
            local version
            version="$(crate_version "$crate")"

            if crate_exists "$crate" "$version"; then
              echo "::notice title=crates.io publish skipped::${crate} ${version} is already published."
              return "$already_published"
            fi

            echo "Publishing ${crate} ${version} to crates.io"
            cargo publish -p "$crate"
            wait_for_crate "$crate" "$version"
          }

          for crate in sage-core sage-tools sage-sdk sage-cli; do
            if publish_crate "$crate"; then
              continue
            fi

            status="$?"
            if [ "$status" -eq "$already_published" ]; then
              continue
            fi

            exit "$status"
          done
