# GitHub Actions workflow for building and releasing Sage
# Triggers on version tags (v*)
# Builds binaries for multiple platforms and creates a GitHub release

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate support matrix
        run: python3 scripts/release_gate.py support-matrix --repo .

      - name: Validate tag, versions, and changelog
        run: python3 scripts/release_gate.py preflight --repo . --tag "${GITHUB_REF_NAME}"

      - name: Validate workflow policy
        run: python3 scripts/release_gate.py validate-workflows --repo .

  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    needs: release-preflight
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Check documentation consistency
        run: python3 scripts/check_doc_consistency.py --report-path "$RUNNER_TEMP/doc_consistency_report.json"

      - name: Confirm generated files are committed
        run: python3 scripts/check_clean_worktree.py --repo .

  security-gates:
    name: Security gates
    runs-on: ubuntu-latest
    needs: release-preflight
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check dependency policy
        run: cargo deny check

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check outdated dependencies
        run: cargo outdated --workspace --root-deps-only --exit-code 1

      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Check MSRV compatibility
        run: cargo check --locked --all-features

  # Create release draft
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [release-preflight, quality-gates, security-gates]
    outputs:
      version: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          prerelease_args=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease_args=(--prerelease)
          fi

          cat > release-notes.md <<EOF
          ## Sage ${GITHUB_REF_NAME}

          **Blazing fast code agent in pure Rust** - 10x faster startup than Node.js alternatives.

          ### Quick Install

          **macOS/Linux:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/majiayu000/sage/main/install.sh | bash
          \`\`\`

          **Cargo (Sage CLI):**
          \`\`\`bash
          cargo install sage-cli
          \`\`\`

          ### Download Binaries

          | Platform | Architecture | File |
          |----------|--------------|------|
          | macOS | Apple Silicon | \`sage-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz\` |
          | macOS | Intel x64 | \`sage-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz\` |
          | Linux | x64 (glibc) | \`sage-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz\` |
          | Linux | x64 (musl) | \`sage-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz\` |
          | Linux | ARM64 | \`sage-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz\` |

          ### Checksums

          Each binary archive is uploaded with a matching \`.sha256\` asset generated from the final archive.

          ### What's New

          See [CHANGELOG.md](https://github.com/majiayu000/sage/blob/main/CHANGELOG.md) for details.
          EOF

          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            "${prerelease_args[@]}" \
            --title "Sage ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md

  # Build binaries for each platform
  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-aarch64-apple-darwin
            archive: tar.gz
            smoke_runner: ""

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-apple-darwin
            archive: tar.gz
            smoke_runner: ""

          # Linux glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu
            archive: tar.gz
            smoke_runner: ""

          # Linux musl (static binary)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-musl
            archive: tar.gz
            smoke_runner: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sage
            asset_name: sage-${{ needs.create-release.outputs.version }}-aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
            smoke_runner: qemu-aarch64 -L /usr/aarch64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user

      - name: Setup cross-compilation
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --package sage-cli

      - name: Strip binary (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (Linux cross)
        if: matrix.cross
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p package
          cp ${{ matrix.artifact_name }} package/
          cp ../../../LICENSE ../../../NOTICE package/
          tar czf ../../../${{ matrix.asset_name }}.tar.gz -C package .

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item ${{ matrix.artifact_name }} package/
          Copy-Item ../../../LICENSE, ../../../NOTICE package/
          Compress-Archive -Path package/* -DestinationPath ../../../${{ matrix.asset_name }}.zip

      - name: Calculate SHA256
        id: sha
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            asset="${{ matrix.asset_name }}.tar.gz"
          else
            asset="${{ matrix.asset_name }}.zip"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi

          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cut -d ' ' -f 1 "${asset}.sha256")" >> "$GITHUB_OUTPUT"

      - name: Smoke packaged archive
        shell: bash
        env:
          SMOKE_RUNNER: ${{ matrix.smoke_runner }}
        run: |
          set -euo pipefail

          if [ -n "${SMOKE_RUNNER}" ]; then
            python3 scripts/release_gate.py smoke-archive \
              --archive "${{ steps.sha.outputs.asset }}" \
              --expected-version "${{ needs.create-release.outputs.version }}" \
              --runner-command "${SMOKE_RUNNER}"
          else
            python3 scripts/release_gate.py smoke-archive \
              --archive "${{ steps.sha.outputs.asset }}" \
              --expected-version "${{ needs.create-release.outputs.version }}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ steps.sha.outputs.asset }}
            ${{ steps.sha.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Attest release archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ steps.sha.outputs.asset }}
            ${{ steps.sha.outputs.asset }}.sha256

      - name: Upload Release Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release upload "${{ needs.create-release.outputs.version }}" \
            "${{ steps.sha.outputs.asset }}" \
            "${{ steps.sha.outputs.asset }}.sha256" \
            --clobber

  verify-release-artifacts:
    name: Verify release artifacts
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Verify archive checksums and manifest
        run: |
          python3 scripts/release_gate.py verify-artifacts \
            --repo . \
            --artifact-dir release-artifacts \
            --version "${{ needs.create-release.outputs.version }}" \
            --write-manifest

      - name: Cargo install smoke
        run: python3 scripts/release_gate.py cargo-install-smoke --repo . --expected-version "${{ needs.create-release.outputs.version }}"

      - name: Upload checksum and signature manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifests
          path: |
            release-artifacts/SHA256SUMS
            release-artifacts/release-manifest.json
          if-no-files-found: error

      - name: Upload manifest assets to draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release upload "${{ needs.create-release.outputs.version }}" \
            release-artifacts/SHA256SUMS \
            release-artifacts/release-manifest.json \
            --clobber

  # Publish release (remove draft status)
  publish-release:
    name: Publish Release
    needs: [create-release, verify-release-artifacts, publish-sage-cli]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Require release prerequisites
        shell: bash
        run: |
          set -euo pipefail

          test "${{ needs.create-release.result }}" = "success"
          test "${{ needs.verify-release-artifacts.result }}" = "success"

          case "${{ needs.publish-sage-cli.result }}" in
            success|skipped) ;;
            *)
              echo "::error title=sage-cli publish gate failed::publish-sage-cli finished with ${{ needs.publish-sage-cli.result }}"
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.create-release.outputs.version }}" --draft=false

  # Publish the public Cargo install target. The root "sage" package is private
  # because that crates.io name belongs to another package; users install Sage
  # through the "sage-cli" crate, which exposes the "sage" binary.
  publish-sage-cli:
    name: Publish sage-cli to crates.io
    needs: [create-release, verify-release-artifacts]
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}  # Skip for pre-releases
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io token
        id: crates_io_token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::error title=crates.io publish blocked::CRATES_IO_TOKEN is not configured for this repository."
            exit 1
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Publish Sage CLI crate
        if: steps.crates_io_token.outputs.available == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          crate_version() {
            local crate="$1"
            cargo metadata --locked --no-deps --format-version 1 \
              | python3 -c '
          import json
          import sys

          crate = sys.argv[1]
          metadata = json.load(sys.stdin)
          for package in metadata["packages"]:
              if package["name"] == crate:
                  print(package["version"])
                  raise SystemExit(0)

          raise SystemExit(f"package {crate!r} was not found in cargo metadata")
          ' "$crate"
          }

          crate_state() {
            local crate="$1"
            local version="$2"
            local state

            state="$(
              curl -fsSL \
                -H "User-Agent: majiayu000/sage-release-workflow" \
                "https://crates.io/api/v1/crates/${crate}/${version}" \
              | python3 -c '
          import json
          import sys

          version = json.load(sys.stdin)["version"]
          print("yanked" if version.get("yanked") else "available")
          ' 2>/dev/null || true
            )"

            if [ -z "${state}" ]; then
              echo "missing"
            else
              echo "${state}"
            fi
          }

          wait_for_crate_available() {
            local crate="$1"
            local version="$2"

            for attempt in {1..30}; do
              if [ "$(crate_state "$crate" "$version")" = "available" ]; then
                echo "${crate} ${version} is visible on crates.io"
                return 0
              fi

              echo "Waiting for ${crate} ${version} to appear on crates.io (${attempt}/30)"
              sleep 10
            done

            echo "::error title=crates.io publish timeout::${crate} ${version} was not visible after publish."
            return 1
          }

          ensure_crate_available() {
            local crate="$1"
            local version
            local state

            version="$(crate_version "$crate")"
            state="$(crate_state "$crate" "$version")"

            case "$state" in
              available)
                echo "::notice title=crates.io publish skipped::${crate} ${version} is already available."
                ;;
              yanked)
                echo "Restoring ${crate} ${version} on crates.io"
                cargo yank "$crate" --version "$version" --undo
                wait_for_crate_available "$crate" "$version"
                ;;
              missing)
                echo "Publishing ${crate} ${version} to crates.io"
                cargo publish --locked -p "$crate"
                wait_for_crate_available "$crate" "$version"
                ;;
              *)
                echo "::error title=unexpected crates.io state::${crate} ${version}: ${state}"
                return 1
                ;;
            esac
          }

          # crates.io does not bundle workspace path dependencies into one
          # package. These dependency crates are restored/published only so
          # the public `cargo install sage-cli` path can resolve.
          for crate in sage-core sage-tools sage-sdk; do
            ensure_crate_available "$crate"
          done

          ensure_crate_available sage-cli

          temp_root="$(mktemp -d)"
          trap 'rm -rf "$temp_root"' EXIT

          sage_cli_version="$(crate_version sage-cli)"
          cargo install sage-cli --version "$sage_cli_version" --root "$temp_root" --locked
          "$temp_root/bin/sage" --version
